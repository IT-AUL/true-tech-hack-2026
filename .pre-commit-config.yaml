# Ruff runs as `language: system` (no extra Python venv) — same idea as eslint/npx.
# Only pre-commit-hooks still use `language: python` (one small venv per clone).
# If that venv fails on macOS (Homebrew Python 3.14 + libexpat): use `pipx install pre-commit`
# or put a stable Python 3.10–3.13 first on PATH — see docs/WORKFLOW.md.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.lock|.*\.svg|src/lib/i18n/.*)$
      - id: end-of-file-fixer
        exclude: ^(.*\.lock|.*\.svg)$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^(.*\.lock|.*\.png)$
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        args: [--fix]
        types: [python]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^backend/
      - id: branch-name
        name: branch name convention
        entry: scripts/hooks/check-branch-name.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: npx eslint --max-warnings=0
        language: system
        files: ^src/.*\.(js|ts|svelte)$
      - id: prettier-check
        name: prettier (frontend)
        entry: npx prettier --check
        language: system
        files: \.(js|ts|svelte|css|json)$
        exclude: ^(node_modules|build|package-lock\.json|src/lib/i18n/)
      - id: no-debug
        name: no debug leftovers
        entry: scripts/hooks/check-no-debug.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: no-secrets
        name: no secrets in code
        entry: scripts/hooks/check-no-secrets.sh
        language: script
        always_run: true
        pass_filenames: false
