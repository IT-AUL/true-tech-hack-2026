# Ruff runs as `language: system` (no extra Python venv) — same idea as eslint/npx.
# All hooks now run natively (`language: system` or `language: script`) to
# avoid Python 3.14 brew virtualenv creation failures on macOS.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main, --branch, develop]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        args: [--fix]
        types: [python]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^backend/
      - id: branch-name
        name: branch name convention
        entry: bash scripts/hooks/check-branch-name.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: npx eslint --max-warnings=0
        language: system
        files: ^src/.*\.(js|ts|svelte)$
      - id: no-debug
        name: no debug leftovers
        entry: bash scripts/hooks/check-no-debug.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: no-secrets
        name: no secrets in code
        entry: bash scripts/hooks/check-no-secrets.sh
        language: system
        always_run: true
        pass_filenames: false
