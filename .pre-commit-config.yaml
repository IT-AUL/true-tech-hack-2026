# Ruff runs as `language: system` (no extra Python venv) — same idea as eslint/npx.
# All hooks now run natively (`language: system` or `language: script`) to
# avoid Python 3.14 brew virtualenv creation failures on macOS.

repos:
  - repo: local
    hooks:
      - id: staged-whitespace
        name: trim trailing whitespace (staged)
        entry: bash scripts/hooks/check-staged-whitespace.sh
        language: system
        pass_filenames: false
      - id: check-yaml-staged
        name: check yaml (staged)
        entry: bash scripts/hooks/check-yaml-staged.sh
        language: system
        pass_filenames: false
      - id: check-added-large-staged
        name: check for added large files (staged)
        entry: bash scripts/hooks/check-large-staged.sh
        language: system
        pass_filenames: false
      - id: check-merge-conflict-staged
        name: check for merge conflicts (staged)
        entry: bash scripts/hooks/check-merge-conflict-staged.sh
        language: system
        pass_filenames: false
      - id: no-commit-to-main
        name: don't commit to main
        entry: bash scripts/hooks/check-no-commit-main.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        args: [--fix]
        types: [python]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^backend/
      - id: branch-name
        name: branch name convention
        entry: bash scripts/hooks/check-branch-name.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: npx eslint . --max-warnings=0
        language: system
        pass_filenames: false
        files: ^src/.*\.(js|ts|svelte)$
      - id: no-debug
        name: no debug leftovers
        entry: bash scripts/hooks/check-no-debug.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: no-secrets
        name: no secrets in code
        entry: bash scripts/hooks/check-no-secrets.sh
        language: system
        always_run: true
        pass_filenames: false
