# Ruff runs as `language: system` (no extra Python venv) — same idea as eslint/npx.
# All hooks now run natively (`language: system` or `language: script`) to
# avoid Python 3.14 brew virtualenv creation failures on macOS.

repos:
  - repo: local
    hooks:
      - id: check-staged-whitespace
        name: check whitespace
        entry: scripts/hooks/check-staged-whitespace.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: check-yaml
        name: check yaml
        entry: scripts/hooks/check-yaml-staged.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: check-large-files
        name: check large files
        entry: scripts/hooks/check-large-staged.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: check-merge-conflict
        name: check merge conflict
        entry: scripts/hooks/check-merge-conflict-staged.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: no-commit-to-branch
        name: block push to main
        entry: scripts/hooks/check-no-commit-main.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        args: [--fix]
        types: [python]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^backend/
      - id: branch-name
        name: branch name convention
        entry: scripts/hooks/check-branch-name.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: npx eslint --max-warnings=0
        language: system
        files: ^src/.*\.(js|ts|svelte)$
      - id: no-debug
        name: no debug leftovers
        entry: scripts/hooks/check-no-debug.sh
        language: script
        always_run: true
        pass_filenames: false
      - id: no-secrets
        name: no secrets in code
        entry: scripts/hooks/check-no-secrets.sh
        language: script
        always_run: true
        pass_filenames: false
