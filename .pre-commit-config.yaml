# Ruff runs as `language: system` (no extra Python venv) — same idea as eslint/npx.
# All hooks now run natively (`language: system` or `language: script`) to
# avoid Python 3.14 brew virtualenv creation failures on macOS.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main, --branch, develop]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        args: [--fix]
        types: [python]
        files: ^backend/
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^backend/
      - id: branch-name
        name: branch name convention
        entry: python -c "import subprocess, sys, re; b=subprocess.check_output(['git', 'rev-parse', '--abbrev-ref', 'HEAD']).decode().strip(); ok = b in ('main', 'develop') or re.match(r'^(feat|fix|chore|refactor|docs|test|sync)/', b); sys.exit(0 if ok else (print(f'Bad branch name {b}'), sys.exit(1)))"
        language: system
        always_run: true
        pass_filenames: false


