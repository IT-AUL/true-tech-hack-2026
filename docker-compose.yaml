services:
  gpthub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpthub
    volumes:
      - gpthub-data:/app/backend/data
    ports:
      - ${PORT:-3000}:8080
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.gpt.mws.ru/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  gpthub-data: {}
