name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  verify:
    name: Verify version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check tag matches package.json
        run: node scripts/check-version-tag.mjs
        env:
          CI_COMMIT_TAG: ${{ github.ref_name }}

  build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and image names
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GHCR_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          DH_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gpthub"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "dh_image=${DH_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push to GHCR + Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: BUILD_HASH=${{ github.ref_name }}
          tags: |
            ${{ steps.version.outputs.ghcr_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.ghcr_image }}:latest
            ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.dh_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GHCR_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          DH_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gpthub"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "dh_image=${DH_IMAGE}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GPTHub ${{ steps.version.outputs.version }}
          body: |
            ## GPTHub ${{ steps.version.outputs.version }}

            | Реестр | Команда |
            |--------|---------|
            | **Docker Hub** | `docker pull ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}` |
            | **GHCR** | `docker pull ${{ steps.version.outputs.ghcr_image }}:${{ steps.version.outputs.version }}` |

            ### Быстрый запуск

            ```bash
            docker run -d -p 3000:8080 \
              -e OPENAI_API_KEY=your-key \
              -v gpthub_data:/app/backend/data \
              ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}
            ```

            Затем открой http://localhost:3000
          generate_release_notes: true
