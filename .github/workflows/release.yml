name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'  # matches v0.8.12-gpthub.2 etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.8.12-gpthub.2)'
        required: true

jobs:
  verify:
    name: Verify version tag
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check tag matches package.json
        run: node scripts/check-version-tag.mjs
        env:
          CI_COMMIT_TAG: ${{ github.event.inputs.tag || github.ref_name }}

  build-push:
    name: Build & push Docker image
    runs-on: [self-hosted, deploy]
    needs: verify
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io org packages
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and image names
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GHCR_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          DH_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gpthub"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "dh_image=${DH_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push to GHCR + Docker Hub
        uses: docker/build-push-action@v5
        continue-on-error: true  # don't block release if registry push fails
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_HASH=${{ github.ref_name }}
          tags: |
            ${{ steps.version.outputs.ghcr_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.ghcr_image }}:latest
            ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.dh_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: [self-hosted, deploy]
    needs: verify   # independent from build-push — release is always created
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GHCR_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          DH_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/gpthub"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "dh_image=${DH_IMAGE}" >> $GITHUB_OUTPUT
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="${VERSION%%-*}"

          # Try full version first (e.g. ## [0.8.12-gpthub.1])
          NOTES=$(awk -v ver="^## \\\[$VERSION\\\]" '$0 ~ ver {found=1; next} found && /^## \[/ {exit} found' CHANGELOG.md | head -120)

          # Fallback: upstream base section (e.g. ## [0.8.12])
          if [ -z "$NOTES" ]; then
            NOTES=$(awk -v ver="^## \\\[$BASE\\\]" '$0 ~ ver {found=1; next} found && /^## \[/ {exit} found' CHANGELOG.md | head -120)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history."
          fi

          # Save multiline to output
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "🚀 GPTHub ${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 GPTHub ${{ steps.version.outputs.version }}

            > Форк [Open WebUI](https://github.com/open-webui/open-webui) с интеллектуальной маршрутизацией моделей и долгосрочной памятью.

            ---

            ### 📦 Установка

            | Реестр | Команда |
            |--------|---------|
            | **Docker Hub** | `docker pull ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}` |
            | **GHCR** | `docker pull ${{ steps.version.outputs.ghcr_image }}:${{ steps.version.outputs.version }}` |

            **Быстрый запуск:**
            ```bash
            docker run -d -p 3000:8080 \
              -e OPENAI_API_KEY=your-key \
              -v gpthub_data:/app/backend/data \
              ${{ steps.version.outputs.dh_image }}:${{ steps.version.outputs.version }}
            ```
            Открой → http://localhost:3000

            ---

            ### 📋 Что изменилось в этой версии (upstream)

            ${{ steps.changelog.outputs.notes }}

            ---

            📖 Полный журнал изменений: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          generate_release_notes: false
