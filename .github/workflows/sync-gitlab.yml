name: Sync main → GitLab MR

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Mirror main → GitLab MR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push sync branch to GitLab and create MR
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          SYNC_BRANCH="sync/github-main-$(date +%Y%m%d-%H%M%S)"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Push to GitLab sync branch
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@git.truetecharena.ru/tta/true-tech-hack-in2026-gpthub-git/it-aul-misisxcuxkfu/task-repo.git"
          git push gitlab "HEAD:refs/heads/${SYNC_BRANCH}"

          # Project path URL-encoded (/ → %2F)
          PROJECT_ID="tta%2Ftrue-tech-hack-in2026-gpthub-git%2Fit-aul-misisxcuxkfu%2Ftask-repo"

          # Create Merge Request via GitLab API
          curl --fail-with-body \
            --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"source_branch\": \"${SYNC_BRANCH}\",
              \"target_branch\": \"main\",
              \"title\": \"chore: sync from GitHub main (${SHORT_SHA})\",
              \"description\": \"Automated sync from GitHub commit [${SHORT_SHA}](https://github.com/${REPO}/commit/${COMMIT_SHA}).\",
              \"remove_source_branch\": true,
              \"squash\": false
            }" \
            "https://git.truetecharena.ru/api/v4/projects/${PROJECT_ID}/merge_requests"
