name: Sync main → GitLab

on:
  push:
    branches: [main]

jobs:
  sync:
    name: Mirror main to GitLab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@git.truetecharena.ru/tta/true-tech-hack-in2026-gpthub-git/it-aul-misisxcuxkfu/task-repo.git"
          git push gitlab main --force
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
