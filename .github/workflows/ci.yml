name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ──────────────────────────────────────────────
  # LINT (frontend + backend в параллели)
  # ──────────────────────────────────────────────

  lint-frontend:
    name: Lint frontend
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint src --max-warnings=0
      - run: npx prettier --check "src/**/*.{js,ts,svelte,css,json}"

  lint-backend:
    name: Lint backend
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff --quiet
      - run: ruff check backend/
      - run: ruff format --check backend/

  # ──────────────────────────────────────────────
  # TEST backend (с кэшем зависимостей)
  # ──────────────────────────────────────────────

  test-backend:
    name: Test backend
    runs-on: [self-hosted, ci]
    env:
      OPENAI_API_BASE_URL: https://example.com/v1
      OPENAI_API_KEY: test-key
      AUDIO_STT_OPENAI_API_BASE_URL: https://example.com/v1
      AUDIO_STT_OPENAI_API_KEY: test-key
      RAG_OPENAI_API_BASE_URL: https://example.com/v1
      RAG_OPENAI_API_KEY: test-key
      WEBUI_SECRET_KEY: test-secret
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio --quiet
      - run: python -m pytest backend/open_webui/test/util -q
