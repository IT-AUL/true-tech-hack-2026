name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Отменяем старый запуск при новом пуше в ту же ветку
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint frontend
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx eslint src --max-warnings=0
      - run: npx prettier --check "src/**/*.{js,ts,svelte,css,json}"
      - if: always()
        run: rm -rf node_modules

  lint-backend:
    name: Lint backend
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - run: python3.11 -m pip install ruff --quiet
      - run: python3.11 -m ruff check backend/
      - run: python3.11 -m ruff format --check backend/

  test-backend:
    name: Test backend
    runs-on: [self-hosted, ci]
    env:
      OPENAI_API_BASE_URL: https://example.com/v1
      OPENAI_API_KEY: test-key
      AUDIO_STT_OPENAI_API_BASE_URL: https://example.com/v1
      AUDIO_STT_OPENAI_API_KEY: test-key
      RAG_OPENAI_API_BASE_URL: https://example.com/v1
      RAG_OPENAI_API_KEY: test-key
      WEBUI_SECRET_KEY: test-secret
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - run: python3.11 -m pip install -r backend/requirements.txt pytest pytest-asyncio --quiet
      - run: python3.11 -m pytest backend/open_webui/test/util -q
