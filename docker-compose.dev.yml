services:
  gpthub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_SLIM: "true"
    container_name: gpthub
    ports:
      - "${PORT:-3000}:8080"
    # Load the rest of .env (RAG_*, AUDIO_STT_*, OLLAMA_*, ROUTERAI_*, etc.).
    # Explicit `environment` entries below still override these when both are set.
    env_file:
      - .env
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://routerai.ru/api/v1}
      # Prefer .env over values already stored in SQLite inside gpthub-data (fixes stale API keys â†’ 401).
      - ENABLE_PERSISTENT_CONFIG=${ENABLE_PERSISTENT_CONFIG:-false}
      # Avoid Ollama connection errors when no daemon on the host; set ENABLE_OLLAMA_API=true in .env if you use Ollama.
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-false}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUDIO_STT_ENGINE=${AUDIO_STT_ENGINE:-openai}
      - AUDIO_STT_OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://routerai.ru/api/v1}
      - AUDIO_STT_OPENAI_API_KEY=${OPENAI_API_KEY}
      # Default must match models your API key can call (MWS: often whisper-medium / whisper-turbo-local).
      - AUDIO_STT_MODEL=${AUDIO_STT_MODEL:-whisper-medium}
      - RAG_EMBEDDING_MODEL=baai/bge-m3
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-gpthub-dev-secret}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - ENABLE_COMMUNITY_SHARING=false
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-baai/bge-m3}
      - RAG_EMBEDDING_BATCH_SIZE=${RAG_EMBEDDING_BATCH_SIZE:-8}
      - RAG_EMBEDDING_CONCURRENT_REQUESTS=${RAG_EMBEDDING_CONCURRENT_REQUESTS:-1}
      - RAG_EMBEDDING_TIMEOUT=${RAG_EMBEDDING_TIMEOUT:-180}
      - RAG_TOP_K=${RAG_TOP_K:-8}
      - RAG_TOP_K_RERANKER=${RAG_TOP_K_RERANKER:-8}
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-true}
      - ENABLE_RAG_HYBRID_SEARCH_ENRICHED_TEXTS=${ENABLE_RAG_HYBRID_SEARCH_ENRICHED_TEXTS:-true}
      - ENABLE_RETRIEVAL_QUERY_GENERATION=${ENABLE_RETRIEVAL_QUERY_GENERATION:-true}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-qwen3-235b-a22b-instruct-2507}
      - RAG_GENERATION_MODEL_EXTERNAL=${RAG_GENERATION_MODEL_EXTERNAL:-qwen3-235b-a22b-instruct-2507}
      - REKA_API_KEY=${REKA_API_KEY}
      - REKA_API_URL=${REKA_API_URL:-https://api.reka.ai/v1}
      - REKA_ROUTER_MODEL=${REKA_ROUTER_MODEL:-rekaai/reka-edge}
      # Web search for deep research tool
      - ENABLE_SEARCH_QUERY_GENERATION=true
      - WEB_SEARCH_ENGINE=${WEB_SEARCH_ENGINE:-tavily}
      - WEB_SEARCH_RESULT_COUNT=${WEB_SEARCH_RESULT_COUNT:-5}
      - WEB_FETCH_MAX_CONTENT_LENGTH=${WEB_FETCH_MAX_CONTENT_LENGTH:-8000}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ROUTER_MODEL=${ROUTER_MODEL:-}
      - ROUTER_API_BASE_URL=${ROUTER_API_BASE_URL:-}
      - ROUTER_API_KEY=${ROUTER_API_KEY:-}
      # Presentation pipeline (auto-routed category == 'presentation').
      # Set ENABLE_PRESENTATION_PIPELINE=false to fall back to a regular text answer.
      - ENABLE_PRESENTATION_PIPELINE=${ENABLE_PRESENTATION_PIPELINE:-true}
      - PRESENTATION_MAX_SLIDES=${PRESENTATION_MAX_SLIDES:-12}
      - PRESENTATION_ENABLE_IMAGES=${PRESENTATION_ENABLE_IMAGES:-true}
      - PRESENTATION_IMAGE_CONCURRENCY=${PRESENTATION_IMAGE_CONCURRENCY:-3}
      - PRESENTATION_ENABLE_DETAIL_STEP=${PRESENTATION_ENABLE_DETAIL_STEP:-true}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - MEM0_VECTOR_STORE_URL=${MEM0_VECTOR_STORE_URL:-http://qdrant:6333}
    volumes:
      - gpthub-data:/app/backend/data
    restart: unless-stopped
    depends_on:
      - neo4j
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  neo4j:
    image: neo4j:5
    container_name: gpthub-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - ${NEO4J_PORT:-7687}:7687
      - 7474:7474
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gpthub-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  gpthub-data:
  neo4j-data:
  qdrant-data:
